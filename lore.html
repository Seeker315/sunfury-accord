<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --text: #d8ceb8; --text-muted: #7a7060; --text-dim: #3e3830;

  body { background: var(--bg); color: var(--text); font-family: 'Raleway', sans-serif; font-weight: 300; line-height: 1.8; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 4rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(9,8,10,0.97) 0%, transparent 100%); }

  .nav-back { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.3s; }
  .nav-back:hover { color: var(--gold); }
  .page-header { padding: 12rem 2rem 5rem; max-width: 1100px; margin: 0 auto; border-bottom: 1px solid var(--border-red); }
  .section-label { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.75rem; }
  .page-title { font-family: 'Cinzel', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 400; color: var(--gold-pale); letter-spacing: 0.1em; margin-bottom: 1rem; }
  .page-intro { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--text-muted); max-width: 600px; line-height: 1.9; }
  .content { max-width: 1100px; margin: 0 auto; padding: 5rem 2rem; }
  .placeholder-note { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--text-dim); border: 1px solid var(--border-red); padding: 2rem; text-align: center; }
  footer { border-top: 1px solid var(--border-red); padding: 2.5rem 4rem; display: flex; justify-content: space-between; align-items: center; margin-top: 4rem; }
  .footer-logo { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.25em; color: var(--gold-dim); }
  .footer-text { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-dim); }
